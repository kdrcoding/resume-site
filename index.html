<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Protected Résumé</title>
  <meta name="theme-color" content="#e8eef4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-body: #eef2f6;
  --bg-card: #ffffff;
  --bg-sidebar: #1a2a3a;
  --bg-soft: #f4f7fa;
  --text-primary: #0b1a2a;
  --text-secondary: #2d3f55;
  --text-muted: #6b7f94;
  --text-sidebar: #cfddee;
  --accent: #2d7d9a;
  --accent-dark: #1f5f78;
  --gold: #e8a838;
  --border: #dce4ed;
  --shadow: 0 10px 32px rgba(11, 26, 42, 0.07);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-btn: 8px;
  --space-section: 2rem;
  --transition: 0.2s ease;
  --font-sans: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

[data-theme="dark"] {
  --bg-body: #0f1a24;
  --bg-card: #1c2a38;
  --bg-sidebar: #0b141e;
  --bg-soft: #152231;
  --text-primary: #e8edf2;
  --text-secondary: #b8c9dd;
  --text-muted: #8a9fb0;
  --text-sidebar: #b8c9dd;
  --border: #2d4055;
  --shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
}

html {
  scroll-behavior: smooth;
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }
}

body {
  font-family: var(--font-sans);
  background:
    radial-gradient(900px 420px at 100% -5%, rgba(45, 125, 154, 0.09), transparent 55%),
    radial-gradient(700px 380px at 0% 100%, rgba(232, 168, 56, 0.06), transparent 50%),
    var(--bg-body);
  color: var(--text-primary);
  line-height: 1.6;
  padding: 1.5rem 1rem 2rem;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

body.is-unlocked {
  animation: resumeIn 0.45s cubic-bezier(0.2, 0.7, 0.2, 1);
}

.svg-sprite {
  position: absolute;
  width: 0;
  height: 0;
  overflow: hidden;
}

.icon {
  width: 1em;
  height: 1em;
  flex-shrink: 0;
  fill: currentColor;
}

.resume-wrapper {
  max-width: 1140px;
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border);
}

.toolbar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 0.6rem;
  padding: 0.75rem 1.5rem;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.badge {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  background: var(--bg-soft);
  padding: 0.25rem 0.75rem;
  border-radius: 999px;
  margin-right: auto;
}

.toolbar-btn {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  padding: 0.42rem 0.85rem;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  font-family: inherit;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}

.toolbar-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.toolbar-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.toolbar-btn--muted:hover {
  background: var(--bg-soft);
  color: var(--text-secondary);
  border-color: var(--border);
}

.toolbar-btn.is-loading {
  opacity: 0.75;
  pointer-events: none;
}

.resume-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
}

.sidebar {
  background: var(--bg-sidebar);
  color: var(--text-sidebar);
  padding: 1.75rem 1.5rem;
}

.avatar {
  text-align: center;
  margin-bottom: 1.5rem;
}

.avatar-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 0 auto 0.85rem;
  border: 3px solid rgba(255, 255, 255, 0.14);
}

.avatar h1 {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.avatar .title {
  font-size: 0.78rem;
  color: var(--gold);
  font-weight: 500;
  margin-top: 0.35rem;
  line-height: 1.45;
}

.sidebar-divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin: 1.25rem 0;
}

.sidebar-section {
  margin-bottom: 1.5rem;
}

.sidebar-section:last-child {
  margin-bottom: 0;
}

.sidebar-section h2 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.42);
  font-weight: 600;
  margin-bottom: 0.75rem;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 0.65rem;
  margin-bottom: 0.55rem;
  font-size: 0.82rem;
}

.contact-item .icon {
  width: 16px;
  height: 16px;
  margin-top: 0.15rem;
  color: var(--gold);
}

.contact-item a {
  color: var(--text-sidebar);
  text-decoration: none;
  word-break: break-word;
}

.contact-item a:hover {
  color: var(--gold);
}

.contact-item span {
  color: rgba(255, 255, 255, 0.82);
}

.lang-item {
  display: flex;
  justify-content: space-between;
  gap: 0.5rem;
  font-size: 0.82rem;
  padding: 0.22rem 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

.lang-item span:last-child {
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.72rem;
  text-align: right;
}

.edu-degree {
  font-size: 0.84rem;
  font-weight: 500;
  color: #fff;
  margin-bottom: 0.2rem;
}

.edu-school,
.edu-year {
  font-size: 0.78rem;
  color: rgba(255, 255, 255, 0.62);
  line-height: 1.45;
}

.main {
  padding: 1.75rem 2rem 2rem;
}

.hero {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1.35rem 1.4rem 1.25rem;
  margin-bottom: var(--space-section);
}

.hero__headline {
  font-size: clamp(1.15rem, 2.5vw, 1.45rem);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.hero__sub {
  margin-top: 0.55rem;
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.55;
}

.hero__auth {
  margin-top: 0.85rem;
  display: inline-block;
  padding: 0.5rem 0.8rem;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--accent-dark);
  background: rgba(45, 125, 154, 0.1);
  border: 1px solid rgba(45, 125, 154, 0.28);
  border-radius: var(--radius-btn);
  line-height: 1.45;
}

.work-auth {
  font-size: 0.82rem;
  color: rgba(255, 255, 255, 0.88);
  line-height: 1.55;
}

.hero__stats {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
  margin-top: 1rem;
}

.hero__stat {
  flex: 1 1 7.5rem;
  min-width: 0;
  padding: 0.65rem 0.75rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  text-align: center;
}

.hero__stat strong {
  display: block;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.hero__stat span {
  display: block;
  margin-top: 0.2rem;
  font-size: 0.72rem;
  color: var(--text-muted);
  line-height: 1.35;
}

.skill-group {
  margin-bottom: 1rem;
}

.skill-group:last-child {
  margin-bottom: 0;
}

.skill-group h3 {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.availability-note {
  margin-top: 1rem;
  padding: 0.85rem 1rem;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.55;
}

.main-section {
  margin-bottom: var(--space-section);
}

.main-section:last-child {
  margin-bottom: 0;
}

.main-section h2 {
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border-bottom: 2px solid var(--border);
  padding-bottom: 0.45rem;
}

.main-section h2 .icon {
  color: var(--gold);
}

.summary-text {
  font-size: 0.92rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.summary-text a {
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
}

.summary-text a:hover {
  text-decoration: underline;
}

.skills-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}

.skill {
  display: inline-block;
  padding: 0.38rem 0.75rem;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.exp-item {
  margin-bottom: 1.35rem;
}

.exp-item:last-child {
  margin-bottom: 0;
}

.exp-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.25rem 0.75rem;
  margin-bottom: 0.15rem;
}

.exp-header h3 {
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--text-primary);
  width: 100%;
}

.exp-header .org {
  font-weight: 500;
  color: var(--accent);
  font-size: 0.86rem;
}

.exp-header .date {
  font-size: 0.76rem;
  color: var(--text-muted);
  font-weight: 500;
}

.bullet-list {
  list-style: none;
  padding: 0;
  font-size: 0.86rem;
  color: var(--text-secondary);
  margin-top: 0.35rem;
}

.bullet-list li {
  position: relative;
  padding-left: 1.1rem;
  margin-bottom: 0.3rem;
  line-height: 1.58;
}

.bullet-list li::before {
  content: "▸";
  position: absolute;
  left: 0;
  color: var(--gold);
  font-weight: 700;
}

.bullet-list a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

.bullet-list a:hover {
  text-decoration: underline;
}

.card {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.9rem 1.05rem;
  margin-bottom: 0.75rem;
}

.card:last-child {
  margin-bottom: 0;
}

.card h3 {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.45rem;
}

.card h3 a {
  color: var(--accent);
  text-decoration: none;
}

.card h3 a:hover {
  text-decoration: underline;
}

.card h3 a::after {
  content: " ↗";
  font-size: 0.8em;
  opacity: 0.65;
}

.cert-list {
  list-style: none;
  padding: 0;
}

.cert-list li {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0;
  padding: 0.45rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.86rem;
  color: var(--text-secondary);
  line-height: 1.55;
}

.cert-list li:last-child {
  border-bottom: none;
}

.cert-list .cert-name {
  font-weight: 600;
  color: var(--text-primary);
}

.cert-sep {
  color: var(--text-muted);
  padding: 0 0.35rem;
}

.cert-list .cert-status {
  font-size: 0.86rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.cert-list .cert-status.is-active {
  color: var(--accent);
  font-weight: 600;
}

.contact-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.65rem;
}

.contact-card {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.75rem 0.85rem;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.84rem;
  transition: border-color var(--transition), background var(--transition);
}

.contact-card:hover {
  border-color: var(--accent);
  background: var(--bg-card);
}

.contact-card--static {
  cursor: default;
}

.contact-card--static:hover {
  border-color: var(--border);
  background: var(--bg-soft);
}

.contact-card .icon {
  width: 18px;
  height: 18px;
  color: var(--gold);
  margin-top: 0.1rem;
}

.contact-card strong {
  display: block;
  color: var(--text-primary);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.15rem;
}

.contact-card span {
  word-break: break-word;
}

@media (max-width: 860px) {
  .resume-grid {
    grid-template-columns: 1fr;
  }

  .sidebar,
  .main {
    padding: 1.35rem 1.15rem;
  }

  .contact-grid {
    grid-template-columns: 1fr;
  }

  .toolbar .badge {
    display: none;
  }
}

@media (max-width: 480px) {
  body {
    padding: 0.5rem;
  }

  .main,
  .sidebar {
    padding: 1.1rem 0.9rem;
  }

  .hero {
    padding: 1.1rem;
  }

  .toolbar {
    padding: 0.65rem 0.85rem;
  }
}

/* ============================================================
   Visual polish
   ============================================================ */
.resume-wrapper {
  animation: resumeIn 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
}
@keyframes resumeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

/* Sidebar: add subtle depth over the flat fill */
.sidebar {
  background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.18));
}

/* Avatar: warm ring */
.avatar-img {
  box-shadow: 0 0 0 3px rgba(232, 168, 56, 0.45), 0 8px 20px rgba(0, 0, 0, 0.35);
}

/* Hero: soft gradient + accent edge */
.hero {
  background: linear-gradient(135deg, var(--bg-soft) 0%, var(--bg-card) 100%);
  border-left: 4px solid var(--accent);
}

/* Section headings: gradient underline instead of flat border */
.main-section h2 {
  border-bottom: none;
  position: relative;
  padding-bottom: 0.55rem;
}
.main-section h2::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 2px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--gold) 55%, transparent);
}

/* Skill chips: lift + accent on hover */
.skill {
  cursor: default;
  transition: transform var(--transition), border-color var(--transition),
    color var(--transition), background var(--transition);
}
.skill:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
  color: var(--accent);
  background: var(--bg-card);
}

/* Experience: timeline rail with dots */
.exp-item {
  position: relative;
  padding-left: 1.15rem;
  border-left: 2px solid var(--border);
}
.exp-item:last-child {
  border-left-color: transparent;
}
.exp-item::before {
  content: "";
  position: absolute;
  left: -5px;
  top: 0.45rem;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--bg-card);
}

/* Project cards: gentle hover lift */
.card {
  transition: transform var(--transition), border-color var(--transition),
    box-shadow var(--transition);
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 8px 22px rgba(11, 26, 42, 0.10);
}

.toolbar-btn:active {
  transform: translateY(1px);
}

@media (prefers-reduced-motion: reduce) {
  .resume-wrapper { animation: none; }
}

@media print {
  @page {
    size: letter;
    margin: 0.4in;
  }

  :root,
  [data-theme="dark"] {
    --bg-body: #ffffff;
    --bg-card: #ffffff;
    --bg-sidebar: #1a2a3a;
    --bg-soft: #f4f7fa;
    --text-primary: #0b1a2a;
    --text-secondary: #2d3f55;
    --text-muted: #6b7f94;
    --text-sidebar: #cfddee;
    --accent: #1f5f78;
    --border: #dce4ed;
    --shadow: none;
  }

  body {
    background: #fff !important;
    padding: 0 !important;
    font-size: 10pt;
    color: #111 !important;
  }

  .resume-wrapper {
    box-shadow: none !important;
    border: none !important;
    border-radius: 0 !important;
    max-width: none !important;
  }

  .toolbar {
    display: none !important;
  }

  .resume-grid {
    display: grid !important;
    grid-template-columns: 2.1in 1fr !important;
  }

  .sidebar {
    background: #1a2a3a !important;
    color: #e8edf2 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .hero,
  .card,
  .contact-card,
  .hero__stat {
    background: #f4f7fa !important;
    break-inside: avoid;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .main-section {
    break-inside: avoid;
    margin-bottom: 0.85rem !important;
  }

  .exp-item {
    break-inside: avoid;
  }

  a {
    text-decoration: none !important;
  }

  .card h3 a::after {
    content: none !important;
  }
}

  
/* --- password lock screen --- */
#resumeMount[hidden]{display:none;}
.lock{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:radial-gradient(1100px 560px at 50% -12%,rgba(45,125,154,0.22),transparent 62%),radial-gradient(700px 400px at 100% 100%,rgba(232,168,56,0.08),transparent 55%),var(--bg-body);}
.lock svg{fill:currentColor;}
.lock-theme{position:absolute;top:1rem;right:1rem;display:inline-flex;align-items:center;gap:.45rem;padding:.45rem .75rem;border:1px solid var(--border);border-radius:999px;background:var(--bg-card);color:var(--text-secondary);font-size:.78rem;font-weight:500;font-family:inherit;cursor:pointer;transition:border-color var(--transition),background var(--transition),color var(--transition);}
.lock-theme:hover{border-color:var(--accent);color:var(--accent);}
.lock-theme .icon{width:16px;height:16px;}
.lock-card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);box-shadow:0 24px 60px rgba(11,26,42,0.18);padding:2.2rem 2rem 1.85rem;max-width:430px;width:100%;text-align:center;animation:lockIn .5s cubic-bezier(.2,.7,.2,1);}
.lock-card.is-shake{animation:lockShake .42s ease;}
@keyframes lockIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes lockShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.lock-brand{font-family:var(--font-sans);font-size:.95rem;font-weight:700;letter-spacing:.04em;color:var(--text-primary);margin-bottom:1rem;}
.lock-brand span{color:var(--accent);}
.lock-badge{width:64px;height:64px;margin:0 auto 1rem;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-dark));box-shadow:0 10px 24px rgba(45,125,154,0.40);}
.lock-badge svg{width:28px;height:28px;color:#fff;}
.lock-card h1{font-size:1.35rem;color:var(--text-primary);letter-spacing:-0.02em;margin-bottom:.35rem;}
.lock-sub{color:var(--text-muted);font-size:.88rem;line-height:1.55;margin-bottom:1.35rem;}
.lock-form{display:flex;flex-direction:column;gap:.65rem;text-align:left;}
.lock-label{font-size:.78rem;font-weight:600;color:var(--text-secondary);letter-spacing:.02em;}
.lock-field{position:relative;display:flex;align-items:center;}
.lock-field__icon{position:absolute;left:.85rem;width:18px;height:18px;color:var(--text-muted);pointer-events:none;}
.lock-form input{width:100%;padding:.82rem 4.2rem .82rem 2.55rem;border:1px solid var(--border);border-radius:var(--radius-btn);background:var(--bg-soft);color:var(--text-primary);font-size:1rem;font-family:inherit;transition:border-color var(--transition),box-shadow var(--transition);}
.lock-form input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,125,154,0.20);}
.lock-form input:disabled{opacity:.65;}
.lock-toggle{position:absolute;right:.45rem;padding:.35rem .55rem;border:0;border-radius:6px;background:transparent;color:var(--accent);font-size:.74rem;font-weight:600;font-family:inherit;cursor:pointer;}
.lock-toggle:hover{background:rgba(45,125,154,0.10);}
.lock-submit{margin-top:.1rem;padding:.85rem;border:0;border-radius:var(--radius-btn);background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;font-weight:600;font-size:.98rem;font-family:inherit;cursor:pointer;transition:filter var(--transition),transform var(--transition),opacity var(--transition);}
.lock-submit:hover:not(:disabled){filter:brightness(1.09);}
.lock-submit:active:not(:disabled){transform:translateY(1px);}
.lock-submit:disabled{opacity:.72;cursor:wait;}
.lock-submit.is-loading{position:relative;}
.lock-error{color:#e5484d;font-size:.84rem;min-height:1.15em;text-align:center;}
.lock-divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem;color:var(--text-muted);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;}
.lock-divider::before,.lock-divider::after{content:"";flex:1;height:1px;background:var(--border);}
.lock-contact{display:flex;flex-direction:column;gap:.5rem;}
.lock-contact a{display:flex;align-items:center;gap:.7rem;padding:.62rem .85rem;border:1px solid var(--border);border-radius:var(--radius-btn);background:var(--bg-soft);color:var(--text-secondary);text-decoration:none;font-size:.86rem;transition:border-color var(--transition),background var(--transition),transform var(--transition);}
.lock-contact a:hover{border-color:var(--accent);background:var(--bg-card);transform:translateY(-1px);}
.lock-contact a svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;}
.lock-contact a span{font-weight:500;}
.lock-foot{margin-top:1.15rem;font-size:.78rem;color:var(--text-muted);line-height:1.5;}
@media(max-width:480px){.lock{padding:1rem;}.lock-card{padding:1.75rem 1.35rem 1.5rem;}.lock-theme{top:.65rem;right:.65rem;}}
</style>
